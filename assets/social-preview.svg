<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Shopify Brands Missing TikTok or SMS</title>
  <desc id="desc">Lists of Shopify brands already spending on Meta or email, but still missing the next obvious channel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2e8" />
      <stop offset="52%" stop-color="#f1eadf" />
      <stop offset="100%" stop-color="#ece4d9" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.96)" />
      <stop offset="100%" stop-color="rgba(255,251,245,0.92)" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="rgba(34,25,18,0.12)" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />
  <circle cx="1060" cy="112" r="180" fill="rgba(15, 118, 110, 0.18)" />
  <circle cx="1170" cy="504" r="164" fill="rgba(15, 118, 110, 0.35)" />
  <circle cx="212" cy="548" r="118" fill="rgba(255,255,255,0.55)" />

  <rect x="54" y="52" width="1172" height="536" rx="36" fill="url(#panel)" stroke="rgba(29,23,18,0.10)" filter="url(#shadow)" />
  <rect x="82" y="82" width="204" height="38" rx="19" fill="#0f766e" opacity="0.14" />
  <text x="104" y="107" fill="rgba(15, 118, 110, 0.92)" font-size="19" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" letter-spacing="1.8">ENRICHANYTHING</text>

  <text x="92" y="166" fill="#1c1712" font-size="68" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700">
    <tspan x="92" dy="0">Shopify Brands Missing</tspan>
    <tspan x="92" dy="78">TikTok or SMS</tspan>
  </text>

  <text x="94" y="356" fill="#3c342c" font-size="28" font-family="Helvetica Neue, Arial, sans-serif" font-weight="500">
    <tspan x="94" dy="0">Lists of Shopify brands already spending on</tspan>
    <tspan x="94" dy="38">Meta or email, but still missing the next</tspan>
    <tspan x="94" dy="38">obvious</tspan>
  </text>

  <text x="94" y="476" fill="#6c5f54" font-size="24" font-family="Helvetica Neue, Arial, sans-serif" font-weight="500">
    <tspan x="94" dy="0">Useful if you sell TikTok ads, SMS, or lifecycle</tspan>
    <tspan x="94" dy="32">work</tspan>
  </text>

  <text x="94" y="564" fill="#6c5f54" font-size="22" font-family="Helvetica Neue, Arial, sans-serif">https://github.com/bhumanai/enrichanything-shopify-channel-gaps</text>

  <rect x="822" y="110" width="330" height="176" rx="28" fill="#fffdf8" stroke="rgba(29,23,18,0.08)" />
  <text x="850" y="152" fill="rgba(15, 118, 110, 0.92)" font-size="20" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" letter-spacing="1.2">BEST FOR</text>
  <text x="850" y="196" fill="#1f1713" font-size="27" font-family="Helvetica Neue, Arial, sans-serif">
    <tspan x="850" dy="0">TikTok agencies</tspan>
    <tspan x="850" dy="38">SMS and lifecycle teams</tspan>
    <tspan x="850" dy="38">Freelance growth operators</tspan>
  </text>

  <rect x="822" y="308" width="330" height="204" rx="28" fill="#fffdf8" stroke="rgba(29,23,18,0.08)" />
  <text x="850" y="350" fill="rgba(15, 118, 110, 0.92)" font-size="20" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" letter-spacing="1.2">START HERE</text>
  <text x="850" y="394" fill="#1f1713" font-size="26" font-family="Helvetica Neue, Arial, sans-serif">
    <tspan x="850" dy="0">Shopify brands in the UK</tspan>
    <tspan x="850" dy="34">running Meta ads but not</tspan>
    <tspan x="850" dy="34">TikTok</tspan>
  </text>

  <rect x="850" y="468" width="119" height="40" rx="20" fill="rgba(15, 118, 110, 0.1)" stroke="rgba(15, 118, 110, 0.28)" />
  <text x="868" y="494" fill="#0f766e" font-size="18" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600">shopify</text>
  <rect x="981" y="468" width="141" height="40" rx="20" fill="rgba(15, 118, 110, 0.1)" stroke="rgba(15, 118, 110, 0.28)" />
  <text x="999" y="494" fill="#0f766e" font-size="18" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600">ecommerce</text>
  <rect x="1134" y="468" width="207" height="40" rx="20" fill="rgba(15, 118, 110, 0.1)" stroke="rgba(15, 118, 110, 0.28)" />
  <text x="1152" y="494" fill="#0f766e" font-size="18" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600">lead generation</text>
  <rect x="1353" y="468" width="220" height="40" rx="20" fill="rgba(15, 118, 110, 0.1)" stroke="rgba(15, 118, 110, 0.28)" />
  <text x="1371" y="494" fill="#0f766e" font-size="18" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600">market intelligence</text>
  <text x="850" y="540" fill="#6c5f54" font-size="20" font-family="Helvetica Neue, Arial, sans-serif">github + pages + tracked CTA links</text>
</svg>